apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: starknet
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'juno'
        static_configs:
          - targets: ['juno.starknet.svc.cluster.local:8080']
      - job_name: 'staking'
        static_configs:
          - targets: ['staking.starknet.svc.cluster.local:8081']
