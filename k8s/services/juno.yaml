apiVersion: v1
kind: Service
metadata:
  name: juno
  namespace: starknet
  labels:
    app: juno
    component: starknet-node
spec:
  selector:
    app: juno
  ports:
    - name: rpc
      port: 6060
      targetPort: 6060
      protocol: TCP
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: ws
      port: 6061
      targetPort: 6061
      protocol: TCP
  type: ClusterIP
