apiVersion: apps/v1
kind: Deployment
metadata:
  name: staking
  namespace: starknet
  labels:
    app: staking
    component: staking-service
    version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: staking
  template:
    metadata:
      labels:
        app: staking
        component: staking-service
        version: latest
    spec:
      containers:
        - name: staking
          image: nethermind/starknet-staking-v2:latest
          args:
            - "-c"
            - "/config/config.json"
            - "--metrics"
            - "--metrics-host"
            - "0.0.0.0"
            - "--metrics-port"
            - "8081"
            - "--provider-http"
            - "http://juno.starknet.svc.cluster.local:6060"
            - "--provider-ws"
            - "ws://juno.starknet.svc.cluster.local:6061"
          ports:
            - name: metrics
              containerPort: 8081
              protocol: TCP
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: staking-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: staking-config
          secret:
            secretName: staking-secret
